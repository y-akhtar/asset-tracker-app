<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>ASSET TRACK — Inventory & Equipment Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="html5-qrcode.min.js"></script>
<script src="qrcode.min.js"></script>
<script src="supabase-js.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📦</text></svg>">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="auth-root"></div>
<div id="app" style="display:none;">
  <nav class="sidebar">
    <div class="brand">
      <div class="display"><span class="rivet"></span>Asset Track</div>
      <div class="sub">Shared inventory · team-wide</div>
    </div>
    <ul class="navlist" id="navlist"></ul>
    <div class="sidebar-foot" id="sidebar-user-info">
      <div class="whoami">Logged as</div>
      <div id="sidebar-username" style="font-size:13px; font-weight:600; color:#fff; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; margin-bottom:4px;">User Name</div>
      <div id="sidebar-userrole" style="font-size:10px; color:#B7B8A8; text-transform:uppercase; letter-spacing:0.05em; margin-bottom:10px;">Role · Company</div>
      <div id="sidebar-switch-container"></div>
      <button class="btn btn-sm btn-danger" id="logout-btn" style="width:100%; justify-content:center;">Logout</button>
    </div>
  </nav>

  <main id="main">
    <div class="mobile-topbar">
      <span class="rivet"></span>
      <span class="display">Asset Track</span>
      <div id="mobile-admin-actions" style="margin-left:auto; display:flex; gap:6px; align-items:center;"></div>
      <button class="btn btn-sm btn-danger" id="mobile-logout-btn" style="margin-left:6px; font-size:11px; padding:4px 8px;">Logout</button>
    </div>
    <div id="view-root"></div>
  </main>
</div>

<div id="modal-root"></div>
<div class="toast" id="toast"></div>

<script src="app.js"></script>
</body>
</html>
