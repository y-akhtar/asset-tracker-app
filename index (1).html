<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>ASSET TRACK — Inventory & Equipment Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root{
    --bg:#EDEEE8;
    --surface:#FFFFFF;
    --surface-alt:#F5F3EA;
    --ink:#1B1C19;
    --ink-soft:#5B5D53;
    --ink-faint:#8B8D80;
    --line:#D9D6C7;
    --line-strong:#C3BFA9;
    --accent:#F0B429;
    --accent-ink:#1B1C19;
    --status-in:#2F6E4C;
    --status-in-bg:#E4F0E6;
    --status-out:#B4522A;
    --status-out-bg:#F5E4DA;
    --danger:#B23A2E;
    --shadow: 0 1px 2px rgba(27,28,25,0.06), 0 8px 24px -12px rgba(27,28,25,0.18);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'IBM Plex Sans', sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  .display{font-family:'Oswald', sans-serif; text-transform:uppercase; letter-spacing:0.03em;}
  .mono{font-family:'IBM Plex Mono', monospace;}
  button{font-family:inherit; cursor:pointer;}
  ::selection{background:var(--accent); color:var(--accent-ink);}

  /* ---------- App shell ---------- */
  #app{display:flex; min-height:100vh;}
  .sidebar{
    width:220px; flex-shrink:0; background:var(--ink); color:#F5F3EA;
    display:flex; flex-direction:column; padding:24px 0;
    position:sticky; top:0; height:100vh;
  }
  .brand{
    padding:0 22px 22px 22px; border-bottom:1px solid rgba(245,243,234,0.12); margin-bottom:14px;
  }
  .brand .display{font-size:20px; font-weight:700; letter-spacing:0.06em; color:#fff; display:flex; align-items:center; gap:8px;}
  .brand .rivet{width:8px; height:8px; border-radius:50%; background:var(--accent); display:inline-block;}
  .brand .sub{font-size:10.5px; color:#B7B8A8; margin-top:4px; letter-spacing:0.08em; text-transform:uppercase;}

  .navlist{list-style:none; margin:0; padding:0; flex:1;}
  .navitem{
    display:flex; align-items:center; gap:10px; padding:11px 22px; font-size:13.5px;
    color:#D6D6C8; cursor:pointer; border-left:3px solid transparent; user-select:none;
    letter-spacing:0.02em;
  }
  .navitem svg{width:16px; height:16px; opacity:0.85; flex-shrink:0;}
  .navitem:hover{background:rgba(245,243,234,0.06); color:#fff;}
  .navitem.active{background:rgba(240,180,41,0.12); border-left-color:var(--accent); color:#fff; font-weight:500;}

  .sidebar-foot{padding:14px 22px 0 22px; border-top:1px solid rgba(245,243,234,0.12); margin-top:10px;}
  .whoami{font-size:11px; color:#9A9C8C; margin-bottom:6px; letter-spacing:0.04em; text-transform:uppercase;}
  .whoami-input{
    width:100%; background:rgba(245,243,234,0.08); border:1px solid rgba(245,243,234,0.15);
    color:#F5F3EA; padding:7px 9px; border-radius:4px; font-size:13px; font-family:inherit;
  }
  .whoami-input:focus{outline:1px solid var(--accent); border-color:var(--accent);}

  main{flex:1; min-width:0; padding:28px 34px 60px 34px;}

  .topbar{display:flex; align-items:flex-start; justify-content:space-between; gap:16px; margin-bottom:22px; flex-wrap:wrap;}
  .pagetitle{font-size:26px; font-weight:600; letter-spacing:0.01em;}
  .pagesub{color:var(--ink-soft); font-size:13.5px; margin-top:4px;}

  .stats-row{display:flex; gap:10px; flex-wrap:wrap;}
  .stat-chip{
    background:var(--surface); border:1px solid var(--line); border-radius:6px;
    padding:9px 14px; min-width:88px; box-shadow:var(--shadow);
  }
  .stat-chip .n{font-family:'Oswald',sans-serif; font-size:22px; font-weight:600; line-height:1;}
  .stat-chip .l{font-size:10.5px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:0.06em; margin-top:3px;}

  .btn{
    display:inline-flex; align-items:center; gap:7px; border:1px solid var(--line-strong);
    background:var(--surface); color:var(--ink); padding:9px 15px; border-radius:6px;
    font-size:13.5px; font-weight:500; transition:transform .08s ease;
  }
  .btn:hover{background:var(--surface-alt);}
  .btn:active{transform:scale(0.98);}
  .btn-primary{background:var(--accent); border-color:var(--accent); color:var(--accent-ink); font-weight:600;}
  .btn-primary:hover{background:#e2a71f;}
  .btn-danger{border-color:var(--danger); color:var(--danger); background:transparent;}
  .btn-danger:hover{background:var(--status-out-bg);}
  .btn-sm{padding:6px 11px; font-size:12.5px;}
  .btn:disabled{opacity:0.5; cursor:not-allowed;}
  .btn svg{width:15px; height:15px;}

  /* ---------- Filters ---------- */
  .filterbar{
    display:flex; gap:8px; flex-wrap:wrap; margin-bottom:18px; align-items:center;
  }
  .search-wrap{position:relative; flex:1; min-width:220px;}
  .search-wrap svg{position:absolute; left:11px; top:50%; transform:translateY(-50%); width:15px; height:15px; color:var(--ink-faint);}
  .search-input{
    width:100%; padding:9px 12px 9px 32px; border:1px solid var(--line-strong); border-radius:6px;
    font-size:13.5px; background:var(--surface); font-family:inherit;
  }
  select.filter-select{
    padding:9px 10px; border:1px solid var(--line-strong); border-radius:6px; background:var(--surface);
    font-size:13px; font-family:inherit; color:var(--ink);
  }

  /* ---------- Asset tag cards ---------- */
  .tag-grid{
    display:grid; grid-template-columns:repeat(auto-fill, minmax(272px, 1fr)); gap:14px;
  }
  .asset-tag{
    background:var(--surface); border:1px solid var(--line); border-radius:8px; position:relative;
    box-shadow:var(--shadow); overflow:hidden; cursor:pointer; transition:box-shadow .12s ease, transform .12s ease;
  }
  .asset-tag:hover{transform:translateY(-1px); box-shadow:0 2px 4px rgba(27,28,25,0.08), 0 14px 28px -14px rgba(27,28,25,0.28);}
  .asset-tag .stripe{height:5px; width:100%;}
  .stripe.in{background:var(--status-in);}
  .stripe.out{background:var(--status-out);}
  .asset-tag-body{padding:14px 14px 12px 18px; position:relative;}
  .rivet-hole{
    position:absolute; left:7px; top:16px; width:9px; height:9px; border-radius:50%;
    background:var(--bg); border:1px solid var(--line-strong);
  }
  .asset-tag-body .name{font-weight:600; font-size:15px; margin-bottom:2px; padding-right:60px;}
  .asset-tag-body .cat{font-size:11.5px; color:var(--ink-soft); margin-bottom:10px;}
  .asset-tag-body .code{font-family:'IBM Plex Mono', monospace; font-size:12px; color:var(--ink-soft); letter-spacing:0.03em;}
  .status-pill{
    position:absolute; top:14px; right:14px; font-size:10px; font-weight:600; text-transform:uppercase;
    letter-spacing:0.05em; padding:3px 8px; border-radius:20px;
  }
  .status-pill.in{background:var(--status-in-bg); color:var(--status-in);}
  .status-pill.out{background:var(--status-out-bg); color:var(--status-out);}
  .tag-meta{display:flex; justify-content:space-between; align-items:flex-end; margin-top:10px; font-size:11.5px; color:var(--ink-faint);}
  .tag-meta .qty{font-family:'Oswald',sans-serif; font-size:15px; font-weight:600; color:var(--ink);}

  .empty-state{
    text-align:center; padding:60px 20px; color:var(--ink-soft); border:1.5px dashed var(--line-strong);
    border-radius:10px; background:var(--surface-alt);
  }
  .empty-state .display{font-size:15px; color:var(--ink); margin-bottom:6px;}

  /* ---------- Modal ---------- */
  .modal-overlay{
    position:fixed; inset:0; background:rgba(27,28,25,0.55); display:flex; align-items:center; justify-content:center;
    z-index:100; padding:20px; backdrop-filter:blur(1px);
  }
  .modal{
    background:var(--surface); border-radius:10px; width:100%; max-width:480px; max-height:88vh; overflow-y:auto;
    box-shadow:0 24px 60px -12px rgba(0,0,0,0.4);
  }
  .modal-head{
    padding:18px 22px; border-bottom:1px solid var(--line); display:flex; justify-content:space-between; align-items:center;
    position:sticky; top:0; background:var(--surface); z-index:1;
  }
  .modal-head h3{margin:0; font-size:17px; font-weight:600;}
  .modal-close{background:none; border:none; font-size:20px; color:var(--ink-soft); line-height:1; padding:4px;}
  .modal-body{padding:20px 22px;}
  .modal-foot{padding:16px 22px; border-top:1px solid var(--line); display:flex; gap:8px; justify-content:flex-end;}

  .field{margin-bottom:14px;}
  .field label{display:block; font-size:12px; font-weight:600; color:var(--ink-soft); margin-bottom:5px; text-transform:uppercase; letter-spacing:0.04em;}
  .field input, .field select, .field textarea{
    width:100%; padding:9px 11px; border:1px solid var(--line-strong); border-radius:6px; font-size:14px; font-family:inherit; background:var(--surface);
  }
  .field textarea{resize:vertical; min-height:60px;}
  .field-row{display:flex; gap:10px;}
  .field-row .field{flex:1;}
  .field-hint{font-size:11.5px; color:var(--ink-faint); margin-top:4px;}
  .inline-scan-btn{display:flex; gap:8px;}
  .inline-scan-btn input{flex:1;}

  /* ---------- Detail modal ---------- */
  .detail-status-row{display:flex; align-items:center; justify-content:space-between; margin-bottom:16px;}
  .detail-code{font-family:'IBM Plex Mono',monospace; font-size:13px; color:var(--ink-soft);}
  .detail-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:16px;}
  .detail-item{background:var(--surface-alt); border:1px solid var(--line); border-radius:6px; padding:10px 12px;}
  .detail-item .l{font-size:10.5px; text-transform:uppercase; color:var(--ink-faint); letter-spacing:0.05em; margin-bottom:3px;}
  .detail-item .v{font-size:14px; font-weight:500;}
  .qr-wrap{display:flex; flex-direction:column; align-items:center; gap:8px; padding:16px; background:var(--surface-alt); border:1px dashed var(--line-strong); border-radius:8px; margin-top:6px;}
  #qrcode-render{background:#fff; padding:8px; border-radius:4px;}

  /* ---------- Scan view ---------- */
  .scan-panel{
    max-width:520px; margin:0 auto; background:var(--surface); border:1px solid var(--line); border-radius:10px;
    padding:24px; box-shadow:var(--shadow); text-align:center;
  }
  #reader{width:100%; border-radius:8px; overflow:hidden; background:#111;}
  .scan-status{font-size:13px; color:var(--ink-soft); margin-top:12px; min-height:18px;}
  .manual-entry{margin-top:20px; padding-top:20px; border-top:1px solid var(--line); text-align:left;}
  .manual-entry label{display:block; font-size:12px; font-weight:600; color:var(--ink-soft); margin-bottom:6px; text-transform:uppercase; letter-spacing:0.04em;}
  .manual-entry-row{display:flex; gap:8px;}
  .manual-entry-row input{flex:1; padding:10px 12px; border:1px solid var(--line-strong); border-radius:6px; font-family:'IBM Plex Mono',monospace; font-size:14px;}

  /* ---------- Activity log ---------- */
  .log-list{display:flex; flex-direction:column; gap:0; background:var(--surface); border:1px solid var(--line); border-radius:8px; overflow:hidden; box-shadow:var(--shadow);}
  .log-row{display:flex; align-items:center; gap:12px; padding:12px 16px; border-bottom:1px solid var(--line);}
  .log-row:last-child{border-bottom:none;}
  .log-dot{width:9px; height:9px; border-radius:50%; flex-shrink:0;}
  .log-dot.in{background:var(--status-in);}
  .log-dot.out{background:var(--status-out);}
  .log-dot.add{background:var(--accent);}
  .log-dot.edit{background:#8B8D80;}
  .log-dot.delete{background:var(--danger);}
  .log-main{flex:1; min-width:0;}
  .log-main .t{font-size:13.5px;}
  .log-main .t b{font-weight:600;}
  .log-main .m{font-size:11.5px; color:var(--ink-faint); margin-top:2px;}
  .log-time{font-size:11.5px; color:var(--ink-faint); white-space:nowrap; font-family:'IBM Plex Mono',monospace;}

  /* ---------- Dashboard ---------- */
  .dash-grid{display:grid; grid-template-columns:2fr 1.2fr; gap:20px; align-items:start;}
  .panel{background:var(--surface); border:1px solid var(--line); border-radius:10px; padding:20px; box-shadow:var(--shadow);}
  .panel h3{margin:0 0 14px 0; font-size:14px; text-transform:uppercase; letter-spacing:0.05em; color:var(--ink-soft); font-weight:600;}
  .cat-bar-row{display:flex; align-items:center; gap:10px; margin-bottom:10px; font-size:13px;}
  .cat-bar-row .cn{width:110px; flex-shrink:0; color:var(--ink-soft); overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .cat-bar-track{flex:1; height:7px; background:var(--surface-alt); border-radius:4px; overflow:hidden;}
  .cat-bar-fill{height:100%; background:var(--accent); border-radius:4px;}
  .cat-bar-n{width:24px; text-align:right; font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--ink-soft);}

  .quick-actions{display:flex; flex-direction:column; gap:8px;}
  .quick-actions .btn{justify-content:flex-start;}

  .toast{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(0); background:var(--ink); color:#fff;
    padding:11px 18px; border-radius:7px; font-size:13.5px; box-shadow:0 10px 30px rgba(0,0,0,0.3); z-index:200;
    opacity:0; transition:opacity .2s ease, transform .2s ease; pointer-events:none; max-width:90vw; text-align:center;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(-6px);}

  /* ---------- Mobile ---------- */
  .mobile-topbar{display:none;}
  @media (max-width: 860px){
    #app{flex-direction:column;}
    .sidebar{
      position:fixed; bottom:0; left:0; right:0; top:auto; width:100%; height:auto; flex-direction:row;
      padding:0; z-index:50; box-shadow:0 -4px 16px rgba(0,0,0,0.2);
    }
    .brand, .sidebar-foot{display:none;}
    .navlist{display:flex; width:100%;}
    .navitem{flex:1; flex-direction:column; justify-content:center; padding:9px 4px; border-left:none; border-top:3px solid transparent; font-size:10.5px; gap:4px; text-align:center;}
    .navitem.active{border-left:none; border-top-color:var(--accent);}
    main{padding:18px 16px 90px 16px;}
    .dash-grid{grid-template-columns:1fr;}
    .mobile-topbar{
      display:flex; align-items:center; gap:8px; margin-bottom:16px; position:sticky; top:0;
      background:var(--bg); padding:6px 0; z-index:10;
    }
    .mobile-topbar .display{font-size:17px; font-weight:700;}
    .mobile-topbar .rivet{width:7px; height:7px; border-radius:50%; background:var(--accent); display:inline-block;}
    .detail-grid{grid-template-columns:1fr 1fr;}
  }
</style>
</head>
<body>
<div id="app">
  <nav class="sidebar">
    <div class="brand">
      <div class="display"><span class="rivet"></span>Asset Track</div>
      <div class="sub">Shared inventory · team-wide</div>
    </div>
    <ul class="navlist" id="navlist">
      <li class="navitem" data-view="dashboard"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg>Dashboard</li>
      <li class="navitem" data-view="inventory"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 8V21H3V8"/><path d="M1 3H23V8H1z"/><path d="M10 12H14"/></svg>Inventory</li>
      <li class="navitem" data-view="scan"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7V4a1 1 0 011-1h3M17 3h3a1 1 0 011 1v3M21 17v3a1 1 0 01-1 1h-3M7 21H4a1 1 0 01-1-1v-3"/><line x1="4" y1="12" x2="20" y2="12"/></svg>Scan</li>
      <li class="navitem" data-view="log"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 8v4l3 3"/><circle cx="12" cy="12" r="9"/></svg>Activity</li>
    </ul>
    <div class="sidebar-foot">
      <div class="whoami">Logged as</div>
      <input class="whoami-input" id="whoami-input" placeholder="Your name" maxlength="40">
    </div>
  </nav>

  <main id="main">
    <div class="mobile-topbar"><span class="rivet"></span><span class="display">Asset Track</span></div>
    <div id="view-root"></div>
  </main>
</div>

<div id="modal-root"></div>
<div class="toast" id="toast"></div>

<script>
(function(){
  "use strict";

  /* ============ STATE ============ */
  let items = [];
  let log = [];
  let currentView = 'dashboard';
  let searchQuery = '';
  let statusFilter = 'all';
  let categoryFilter = 'all';
  let myName = '';
  let html5QrInstance = null;
  let dataLoaded = false;

  const CATEGORIES = ['IT Hardware','Machinery','Tools','Furniture','Vehicles','Safety Equipment','Electronics','Other'];

  /* ============ STORAGE HELPERS ============ */
  async function loadAll(){
    try{
      const itemsRes = await window.storage.get('inventory:items', true);
      items = itemsRes ? JSON.parse(itemsRes.value) : [];
    }catch(e){ items = []; }
    try{
      const logRes = await window.storage.get('inventory:log', true);
      log = logRes ? JSON.parse(logRes.value) : [];
    }catch(e){ log = []; }
    try{
      const nameRes = await window.storage.get('user:display-name', false);
      myName = nameRes ? nameRes.value : '';
    }catch(e){ myName = ''; }
    dataLoaded = true;
  }

  async function saveItems(){
    try{ await window.storage.set('inventory:items', JSON.stringify(items), true); }
    catch(e){ showToast('Could not save — check your connection.'); }
  }

  async function saveLog(){
    if(log.length > 300) log = log.slice(0, 300);
    try{ await window.storage.set('inventory:log', JSON.stringify(log), true); }
    catch(e){ /* non-fatal */ }
  }

  async function saveMyName(){
    try{ await window.storage.set('user:display-name', myName, false); }catch(e){}
  }

  function addLogEntry(action, item, note){
    log.unshift({
      id: 'l' + Date.now() + Math.random().toString(36).slice(2,7),
      action: action,
      itemId: item ? item.id : null,
      itemName: item ? item.name : (note || ''),
      by: myName || 'Unnamed user',
      ts: Date.now(),
      note: note || ''
    });
    saveLog();
  }

  /* ============ UTIL ============ */
  function uid(prefix){ return prefix + Date.now().toString(36).toUpperCase() + Math.random().toString(36).slice(2,5).toUpperCase(); }
  function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  function timeAgo(ts){
    const s = Math.floor((Date.now()-ts)/1000);
    if(s<60) return 'just now';
    if(s<3600) return Math.floor(s/60)+'m ago';
    if(s<86400) return Math.floor(s/3600)+'h ago';
    if(s<604800) return Math.floor(s/86400)+'d ago';
    return new Date(ts).toLocaleDateString();
  }
  function showToast(msg){
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(showToast._h);
    showToast._h = setTimeout(()=>t.classList.remove('show'), 2600);
  }

  /* ============ RENDER: SHELL ============ */
  function setActiveNav(){
    document.querySelectorAll('.navitem').forEach(el=>{
      el.classList.toggle('active', el.dataset.view===currentView);
    });
  }

  function render(){
    setActiveNav();
    const root = document.getElementById('view-root');
    if(currentView==='dashboard') root.innerHTML = renderDashboard();
    else if(currentView==='inventory') root.innerHTML = renderInventory();
    else if(currentView==='scan') root.innerHTML = renderScan();
    else if(currentView==='log') root.innerHTML = renderLog();
    afterRenderHooks();
  }

  function afterRenderHooks(){
    if(currentView==='inventory'){
      document.querySelectorAll('.asset-tag').forEach(el=>{
        el.addEventListener('click', ()=> openDetailModal(el.dataset.id));
      });
      const s = document.getElementById('inv-search');
      if(s){ s.value = searchQuery; s.addEventListener('input', e=>{ searchQuery = e.target.value; renderInventoryListOnly(); }); }
      const st = document.getElementById('inv-status-filter');
      if(st){ st.value = statusFilter; st.addEventListener('change', e=>{ statusFilter=e.target.value; renderInventoryListOnly(); }); }
      const ct = document.getElementById('inv-cat-filter');
      if(ct){ ct.value = categoryFilter; ct.addEventListener('change', e=>{ categoryFilter=e.target.value; renderInventoryListOnly(); }); }
    }
    if(currentView==='scan'){
      const btn = document.getElementById('start-scan-btn');
      if(btn) btn.addEventListener('click', startScanner);
      const stopBtn = document.getElementById('stop-scan-btn');
      if(stopBtn) stopBtn.addEventListener('click', stopScanner);
      const manualForm = document.getElementById('manual-scan-form');
      if(manualForm) manualForm.addEventListener('submit', e=>{
        e.preventDefault();
        const val = document.getElementById('manual-code-input').value.trim();
        if(val) handleScannedCode(val);
      });
    }
  }

  /* ============ DASHBOARD ============ */
  function renderDashboard(){
    const total = items.length;
    const checkedOut = items.filter(i=>i.status==='out').length;

    const catEntries = Object.entries(catCounts).sort((a,b)=>b[1]-a[1]).slice(0,6);

    const recent = log.slice(0,6);

    return `

        <div>
          <div class="pagetitle">Dashboard</div>
          <div class="pagesub">Live overview of team-wide inventory</div>
        </div>

        </div>

            <h3>By Category</h3>

              <div class="cat-bar-row">

                <div class="cat-bar-n">${n}</div>

          </div>
          <div class="panel">
            <h3>Quick Actions</h3>
            <div class="quick-actions">
              <button class="btn btn-primary" onclick="__app.openAddModal()">${iconPlus()}Add New Asset</button>
              <button class="btn" onclick="__app.goto('scan')">${iconScan()}Scan Barcode</button>
              <button class="btn" onclick="__app.goto('inventory')">${iconList()}View Inventory</button>
            </div>

        </div>
      </div>

  }

    return `<div class="log-row">
      <div class="log-dot ${dotClass}"></div>
      <div class="log-main">
        <div class="t"><b>${esc(l.by)}</b> ${verb} <b>${esc(l.itemName||'an item')}</b></div>

  function getFilteredItems(){
    const q = searchQuery.trim().toLowerCase();
    return items.filter(i=>{
      if(statusFilter!=='all' && i.status!==statusFilter) return false;
      if(categoryFilter!=='all' && i.category!==categoryFilter) return false;
      if(q && !(i.name.toLowerCase().includes(q) || i.barcode.toLowerCase().includes(q) || (i.department||'').toLowerCase().includes(q) || (i.assignedTo||'').toLowerCase().includes(q))) return false;
      return true;
    }).sort((a,b)=> b.updatedAt - a.updatedAt);
  }

  function startScanner(){
    const readerEl = document.getElementById('reader');
    const idleEl = document.getElementById('scan-idle');
    const stopBtn = document.getElementById('stop-scan-btn');
    const statusEl = document.getElementById('scan-status');
    if(typeof Html5Qrcode === 'undefined'){
      statusEl.textContent = 'Scanner library failed to load. Use manual entry below.';
      return;
    }
    readerEl.style.display = 'block';
    idleEl.style.display = 'none';
    stopBtn.style.display = 'inline-flex';
    statusEl.textContent = 'Requesting camera access…';

    html5QrInstance = new Html5Qrcode('reader');
    Html5Qrcode.getCameras().then(cams=>{
      if(!cams || !cams.length){ throw new Error('no-camera'); }
      const camId = (cams.find(c=>/back|rear|environment/i.test(c.label)) || cams[cams.length-1]).id;
      return html5QrInstance.start(
        camId,
        { fps: 10, qrbox: { width: 240, height: 240 } },
        (decodedText)=>{
          statusEl.textContent = 'Code detected: ' + decodedText;
          handleScannedCode(decodedText);
          stopScanner();
        },
        ()=>{ /* per-frame decode errors, ignore */ }
      );
    }).then(()=>{
      statusEl.textContent = 'Scanning… hold the code steady in the frame.';
    }).catch(err=>{
      statusEl.textContent = 'Could not access camera. You can still enter the code manually below.';
      stopScanner();
    });
  }

  function stopScanner(){
    const readerEl = document.getElementById('reader');
    const idleEl = document.getElementById('scan-idle');
    const stopBtn = document.getElementById('stop-scan-btn');
    if(html5QrInstance){
      html5QrInstance.stop().then(()=>{
        html5QrInstance.clear();
        html5QrInstance = null;
      }).catch(()=>{ html5QrInstance = null; });
    }
    if(readerEl) readerEl.style.display = 'none';
    if(idleEl) idleEl.style.display = 'block';
    if(stopBtn) stopBtn.style.display = 'none';
  }

  function handleScannedCode(code){
    const item = items.find(i=> i.barcode.toLowerCase() === code.trim().toLowerCase());
    if(item){
      openDetailModal(item.id);
    }else{
      openAddModal(code.trim());
      showToast('New barcode — fill in details to add this asset.');
    }
  }

  async function submitAdd(){
    const name = document.getElementById('f-name').value.trim();
    const barcode = document.getElementById('f-barcode').value.trim();
    if(!name){ showToast('Asset name is required.'); return; }
    if(!barcode){ showToast('Barcode / asset ID is required.'); return; }
    if(items.some(i=>i.barcode.toLowerCase()===barcode.toLowerCase())){ showToast('That barcode is already in use.'); return; }

    const item = {
      id: uid('itm_'),
      name,
      category: document.getElementById('f-category').value,
      quantity: Math.max(1, parseInt(document.getElementById('f-qty').value)||1),
      barcode,
      department: document.getElementById('f-department').value.trim(),
      location: document.getElementById('f-location').value.trim(),
      notes: document.getElementById('f-notes').value.trim(),
      status: 'in',
      assignedTo: '',
      createdAt: Date.now(),
      updatedAt: Date.now()
    };
    items.unshift(item);
    await saveItems();
    addLogEntry('added', item, item.department ? ('Dept: '+item.department) : '');
    closeModal();
    showToast('Asset added.');
    render();
  }

  async function submitEdit(id){
    const item = items.find(i=>i.id===id);
    if(!item) return;
    const name = document.getElementById('f-name').value.trim();
    const barcode = document.getElementById('f-barcode').value.trim();
    if(!name){ showToast('Asset name is required.'); return; }
    if(!barcode){ showToast('Barcode / asset ID is required.'); return; }
    if(items.some(i=>i.id!==id && i.barcode.toLowerCase()===barcode.toLowerCase())){ showToast('That barcode is already in use.'); return; }

    item.name = name;
    item.category = document.getElementById('f-category').value;
    item.quantity = Math.max(1, parseInt(document.getElementById('f-qty').value)||1);
    item.barcode = barcode;
    item.department = document.getElementById('f-department').value.trim();
    item.location = document.getElementById('f-location').value.trim();
    item.notes = document.getElementById('f-notes').value.trim();
    item.updatedAt = Date.now();
    await saveItems();
    addLogEntry('edited', item, '');
    closeModal();
    showToast('Changes saved.');
    render();
  }

  async function doCheckOut(id){
    const item = items.find(i=>i.id===id);
    if(!item) return;
    const assignEl = document.getElementById('f-assign');
    const noteEl = document.getElementById('f-checkout-note');
    const assignedTo = assignEl ? assignEl.value.trim() : '';
    if(!assignedTo){ showToast('Enter who this is being checked out to.'); return; }
    item.status = 'out';
    item.assignedTo = assignedTo;
    item.updatedAt = Date.now();
    await saveItems();
    addLogEntry('checked-out', item, noteEl && noteEl.value.trim() ? noteEl.value.trim() : ('To: '+assignedTo));
    closeModal();
    showToast(item.name + ' checked out to ' + assignedTo + '.');
    render();
  }

  async function doCheckIn(id){
    const item = items.find(i=>i.id===id);
    if(!item) return;
    const returnedFrom = item.assignedTo;
    item.status = 'in';
    item.assignedTo = '';
    item.updatedAt = Date.now();
    await saveItems();
    addLogEntry('checked-in', item, returnedFrom ? ('From: '+returnedFrom) : '');
    closeModal();
    showToast(item.name + ' checked back in.');
    render();
  }

  async function doDelete(id){
    const item = items.find(i=>i.id===id);
    if(!item) return;
    if(!confirm('Delete "'+item.name+'"? This cannot be undone.')) return;
    items = items.filter(i=>i.id!==id);
    await saveItems();
    addLogEntry('deleted', item, '');
    closeModal();
    showToast('Asset deleted.');
    render();
  }

  function iconTrash(){ return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>`; }
  function iconSave(){ return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>`; }

  /* ============ NAV / INIT ============ */
  function goto(view){
    currentView = view;
    if(view !== 'scan') stopScanner();
    render();
  }

  document.getElementById('navlist').addEventListener('click', e=>{
    const el = e.target.closest('.navitem');
    if(el) goto(el.dataset.view);
  });

  const whoInput = document.getElementById('whoami-input');
  whoInput.addEventListener('change', ()=>{ myName = whoInput.value.trim(); saveMyName(); });
  whoInput.addEventListener('blur', ()=>{ myName = whoInput.value.trim(); saveMyName(); });

  window.__app = {
    goto, openAddModal, closeModal, regenBarcode, submitAdd,
    openDetailModal, openEditModal, submitEdit,
    doCheckOut, doCheckIn, doDelete
  };

  async function init(){
    document.getElementById('view-root').innerHTML = `<div class="empty-state"><div class="display">Loading inventory…</div></div>`;
    await loadAll();
    whoInput.value = myName;
    render();
  }

  init();
})();
</script>
